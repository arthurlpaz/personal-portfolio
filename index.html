<!doctype html>
<html lang="en">

    <!-- Favicon (served from /public at the site root by Vite) -->

    <!-- Primary meta -->
    <title>Arthur Lincoln da Paz — AI Engineer</title>

      name="description"

    <!--
      Canonical / social URLs must be absolute. Update this single value to the
      production domain once deployed (e.g. a custom domain).
    -->
    <link rel="canonical" href="https://arthurlpaz.vercel.app/" />

    <!--
      Language alternates. The page swaps its content client-side and rewrites
      document.lang, but crawlers still need these to know both versions exist.
    -->
    <link rel="alternate" hreflang="en" href="https://arthurlpaz.vercel.app/?lang=en" />
    <link rel="alternate" hreflang="pt-BR" href="https://arthurlpaz.vercel.app/?lang=pt" />
    <link rel="alternate" hreflang="x-default" href="https://arthurlpaz.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Arthur Lincoln da Paz" />
    <meta property="og:title" content="Arthur Lincoln da Paz — AI Engineer" />

      property="og:description"
      content="Building production ML systems for medical imaging, energy forecasting and intelligent LLM applications."
    />
    <meta property="og:url" content="https://arthurlpaz.vercel.app/" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Arthur Lincoln da Paz — AI Engineer" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="pt_BR" />

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
