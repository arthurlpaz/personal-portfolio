name: Deploy to Vercel

# Deploys the production build to Vercel on every push to main.
# Pull requests get a lint + build check only (no deploy).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       - a Vercel access token (vercel.com/account/tokens)
#   VERCEL_ORG_ID      - from `vercel link` (.vercel/project.json) or dashboard
#   VERCEL_PROJECT_ID  - from `vercel link` (.vercel/project.json) or dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # --- Deploy (production, main branch only) ---
      - name: Install Vercel CLI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
